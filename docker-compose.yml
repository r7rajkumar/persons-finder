version: "3.9"

# Persons Finder — single-command run for reviewers, on any OS with Docker
# installed (Docker Desktop on macOS/Windows, Docker Engine on Linux).
#
#   docker compose up --build
#
# The app uses an in-memory H2 database (matches the challenge's "in-memory
# is fine" storage option), so no separate database container is required.
# Data resets whenever the container restarts.

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: persons-finder:local
    container_name: persons-finder-app
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: default
      JAVA_OPTS: "-Xms256m -Xmx512m"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8080/swagger-ui/index.html"]
      interval: 15s
      timeout: 5s
      start_period: 30s
      retries: 5
    restart: unless-stopped
